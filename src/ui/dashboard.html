
<html>

<head>
<title>Vinet DMARC Security Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f6f9;
}

.header{
background:white;
border-bottom:3px solid #e30613;
padding:15px;
display:flex;
gap:10px;
}

.logo{
height:36px;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="header">
<img src="https://static.vinet.co.za/logo.jpeg" class="logo">
<strong>Vinet DMARC Security Platform</strong>
</div>

<div class="container">

<div class="card">

<h3>Add Domain</h3>

<input id="domainInput" placeholder="domain.com">

<button onclick="addDomain()">Add</button>

</div>

<div class="card">

<h3>Monitored Domains</h3>

<table id="domains"></table>

</div>

<div class="card">

<h3>Scan Domain</h3>

<input id="scanDomainInput" placeholder="domain.com">

<button onclick="scanDomain()">Scan</button>

<div id="scanResults"></div>

</div>

</div>

<script>

async function loadDomains(){

const r = await fetch("/api/domains/list")
const d = await r.json()

let html="<tr><th>Domain</th><th>Action</th></tr>"

d.forEach(x=>{

html+="<tr>"
html+="<td>"+x.domain+"</td>"
html+="<td><button onclick='removeDomain(""+x.domain+"")'>Remove</button></td>"
html+="</tr>"

})

domains.innerHTML=html

}

async function addDomain(){

const domain=document.getElementById("domainInput").value

await fetch("/api/domains/add",{
method:"POST",
body:JSON.stringify({domain})
})

loadDomains()

}

async function removeDomain(domain){

await fetch("/api/domains/remove",{
method:"POST",
body:JSON.stringify({domain})
})

loadDomains()

}

async function scanDomain(){

const domain=document.getElementById("scanDomainInput").value

const r = await fetch("/api/domain_lookup?domain="+domain)

const d = await r.json()

scanResults.innerHTML=JSON.stringify(d,null,2)

}

loadDomains()

</script>

</body>
</html>
